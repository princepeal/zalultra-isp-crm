<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Login...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h2 { margin-bottom: 0.5rem; }
        p { opacity: 0.9; }
    </style>
    <!-- Redirect to Zal Ultra /self login page with MikroTik hotspot parameters -->
    <meta http-equiv="refresh" content="0;url=http://192.168.68.109/self?link-login=$(link-login-only)&link-orig=$(link-orig)&mac=$(mac)&ip=$(ip)&chap-id=$(chap-id)&chap-challenge=$(chap-challenge)">
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Connecting...</h2>
        <p>Redirecting to login page...</p>
        <noscript>
            <p><a href="http://192.168.68.109/self?link-login=$(link-login-only)&link-orig=$(link-orig)&mac=$(mac)&ip=$(ip)">Click here if not redirected</a></p>
        </noscript>
    </div>
</body>
</html>
